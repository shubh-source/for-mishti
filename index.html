<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Something Special… 💌</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,600&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--rose:#e8718a;--deep:#c94f6b;--blush:#f9c6d0;--peach:#fde8d8;--cream:#fff8f5;--text:#5a2d3f;--mid:#8b4f63}
html,body{height:100%;overflow:hidden}
body{font-family:'Lato',sans-serif;background:linear-gradient(140deg,#fde8d8 0%,#f9c6d0 40%,#ffd6e0 70%,#fef5f8 100%);display:flex;align-items:center;justify-content:center;position:relative}
.petal{position:fixed;border-radius:50% 0 50% 0;pointer-events:none;animation:petalFall linear infinite}
@keyframes petalFall{0%{transform:translateY(-20px) rotate(0deg);opacity:.5}100%{transform:translateY(105vh) rotate(400deg);opacity:0}}
.card{text-align:center;padding:64px 52px;background:rgba(255,255,255,.55);backdrop-filter:blur(24px);border-radius:36px;border:1.5px solid rgba(255,255,255,.75);box-shadow:0 24px 70px rgba(233,113,138,.2);max-width:480px;width:92%;position:relative;z-index:2;animation:cardIn 1.1s cubic-bezier(.22,1,.36,1) forwards;opacity:0}
@keyframes cardIn{from{opacity:0;transform:translateY(50px) scale(.94)}to{opacity:1;transform:none}}
.env{font-size:68px;display:block;margin-bottom:26px;animation:envBounce 2.2s ease-in-out infinite;filter:drop-shadow(0 6px 14px rgba(233,113,138,.3))}
@keyframes envBounce{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-12px) scale(1.06)}}
.tag{font-size:10px;letter-spacing:5px;text-transform:uppercase;color:var(--rose);margin-bottom:16px;display:block;opacity:0;animation:up .8s .6s forwards}
.title{font-family:'Playfair Display',serif;font-size:clamp(28px,7vw,42px);color:var(--text);line-height:1.3;margin-bottom:18px;opacity:0;animation:up .8s .8s forwards}
.title em{color:var(--deep);font-style:italic}
.sub{font-size:15px;color:var(--mid);line-height:1.8;margin-bottom:38px;font-style:italic;opacity:0;animation:up .8s 1s forwards}
.btn{display:inline-flex;align-items:center;gap:10px;background:linear-gradient(135deg,var(--rose),var(--deep));color:#fff;padding:18px 50px;border-radius:60px;font-family:'Lato',sans-serif;font-size:15px;letter-spacing:2px;text-transform:uppercase;border:none;cursor:pointer;box-shadow:0 10px 36px rgba(201,79,107,.4);opacity:0;animation:up .8s 1.2s forwards,pulse 2.5s 2s infinite;transition:transform .2s,box-shadow .2s}
.btn:hover{transform:translateY(-4px) scale(1.03);box-shadow:0 18px 46px rgba(201,79,107,.5)}
@keyframes pulse{0%,100%{box-shadow:0 10px 36px rgba(201,79,107,.4)}50%{box-shadow:0 10px 56px rgba(201,79,107,.62)}}
.row{margin-top:28px;font-size:20px;letter-spacing:10px;opacity:0;animation:up .8s 1.4s forwards}
@keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
body.out{animation:leaveOut .75s ease forwards}
@keyframes leaveOut{to{opacity:0;transform:scale(1.05)}}

/* ── CATS ── */
.cat{position:fixed;pointer-events:none;z-index:50}
.cat-tl{top:16px;left:16px;animation:catFloat 4s ease-in-out infinite}
.cat-tr{top:16px;right:16px;animation:catFloat 4s 1.2s ease-in-out infinite}
.cat-bl{bottom:16px;left:16px;animation:catWiggle 3.5s ease-in-out infinite}
.cat-br{bottom:16px;right:16px;animation:catBob 3s ease-in-out infinite}
@keyframes catFloat{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-14px) rotate(4deg)}}
@keyframes catWiggle{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg) scale(1.07)}}
@keyframes catBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
</style>
</head>
<body>
<script>
const pc=['#f9c6d0','#fde8d8','#ffb3c6','#ffd6e0'];
for(let i=0;i<22;i++){const p=document.createElement('div');p.className='petal';const s=8+Math.random()*12;p.style.cssText=`left:${Math.random()*100}vw;width:${s}px;height:${s}px;background:${pc[i%4]};animation-duration:${5+Math.random()*7}s;animation-delay:${Math.random()*6}s`;document.body.appendChild(p)}
</script>
